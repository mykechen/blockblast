algorithm: c51

model:
  type: categorical
  hidden_channels: 96
  num_blocks: 4
  fc_hidden: 768
  head_hidden: 256
  n_atoms: 51
  v_min: -10.0
  v_max: 300.0

reward:
  cells_cleared_weight: 10.0
  multi_line_bonus: 0.0
  multi_line_exp_bonus: 10.0
  combo_streak_bonus: 5.0
  loaded_line_bonus: 1.5
  loaded_line_threshold: 6
  center_fill_penalty: 1.0
  board_cleanliness_weight: 0.1
  hole_penalty: 2.0
  survival_bonus: 0.5
  game_over_penalty: 50.0

training:
  total_steps: 3_000_000
  batch_size: 128
  gamma: 0.99
  learning_rate: 0.00005
  epsilon_start: 1.0
  epsilon_end: 0.02
  epsilon_decay_steps: 1_000_000
  target_update_freq: 2000
  train_freq: 4
  replay_buffer_size: 500_000
  min_replay_size: 10_000
  n_step: 1
